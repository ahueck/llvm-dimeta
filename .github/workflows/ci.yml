name: Dimeta-CI

on:
  push:
    branches: [ main, devel ]
  pull_request:

env:
  CXX: clang++
  CC: clang

jobs:
  format-check:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-18 main" | sudo tee /etc/apt/sources.list.d/llvm-18.list

      - name: Update apt
        run: sudo apt-get update

      - name: Install clang-format
        run: |
          sudo apt-get remove clang-format-*
          sudo apt-get install -t llvm-toolchain-noble-18 clang-format-18

      - name: Format source code
        run: |
          find demo lib test \
            -type f \
            -a \( -name "*.c" -o -name "*.cpp" -o -name "*.h" \) \
            -print0 \
            | xargs -0 clang-format-18 -i

      - name: Format check
        run: |
          git status --porcelain --untracked-files=no
          git status --porcelain --untracked-files=no | xargs -o -I {} test -z \"{}\"

  codespell:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5
      - uses: codespell-project/actions-codespell@v2.1

  lit-suite:
    strategy:
      fail-fast: false
      matrix:
        llvm-version: [18, 19, 20, 21, 22]
        os: [ubuntu-24.04]
        use-tbaa: [true, false]
        with-flang: [false]
        include:
          - llvm-version: 13
            os: ubuntu-22.04
          - llvm-version: 14
            os: ubuntu-22.04
          - llvm-version: 15
            os: ubuntu-22.04
          - llvm-version: 21
            os: ubuntu-24.04
            use-tbaa: true
            with-flang: true
          - llvm-version: 21
            os: ubuntu-24.04
            use-tbaa: false
            with-flang: true
          - llvm-version: 22
            os: ubuntu-24.04
            use-tbaa: true
            with-flang: true
          - llvm-version: 22
            os: ubuntu-24.04
            use-tbaa: false
            with-flang: true

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: LLVM apt
        if: ${{ matrix.llvm-version > 19 }}
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-${{ matrix.llvm-version }} main" | sudo tee /etc/apt/sources.list.d/llvm-${{ matrix.llvm-version }}.list

      - name: Update apt
        run: sudo apt-get update

      - name: Install LLVM
        run: sudo apt-get install libllvm${{ matrix.llvm-version }} llvm-${{ matrix.llvm-version }} llvm-${{ matrix.llvm-version }}-dev

      - name: Install Clang
        run: sudo apt-get install clang-${{ matrix.llvm-version }} clang-tidy-${{ matrix.llvm-version }}

      - name: Install Flang
        if: matrix.with-flang == true
        run: sudo apt-get install flang-${{ matrix.llvm-version }} libflang-${{ matrix.llvm-version }}-dev

      - name: Install lcov
        run: sudo apt-get install lcov

      - name: Setup env
        run: |
          sudo ln -f -s /usr/bin/clang-${{ matrix.llvm-version }} /usr/bin/clang
          sudo ln -f -s /usr/bin/clang++-${{ matrix.llvm-version }} /usr/bin/clang++
          if [ "${{ matrix.with-flang }}" = "true" ]; then
            sudo ln -f -s /usr/bin/flang-${{ matrix.llvm-version }} /usr/bin/flang
          fi
          echo "LLVM_CMAKE_DIR=/usr/lib/llvm-${{ matrix.llvm-version }}/cmake" >> $GITHUB_ENV
          echo "EXTERNAL_LIT=/usr/lib/llvm-${{ matrix.llvm-version >= 20 && 18 || matrix.llvm-version }}/build/utils/lit/lit.py" >> $GITHUB_ENV
          echo "USE_TBAA=${{ matrix.use-tbaa == true && 'ON' || 'OFF' }}" >> $GITHUB_ENV
          echo "WITH_FLANG=${{ matrix.with-flang == true && 'ON' || 'OFF' }}" >> $GITHUB_ENV

      - name: Configure Dimeta
        run: |
          cmake -B build --preset coverage \
            -DLLVM_DIR=${LLVM_CMAKE_DIR} \
            -DLLVM_EXTERNAL_LIT=${EXTERNAL_LIT} \
            -DDIMETA_USE_TBAA=${USE_TBAA} \
            -DDIMETA_ENABLE_FLANG=${WITH_FLANG}

      - name: Build Dimeta
        run: cmake --build build --parallel 2

      - name: Test with lit-suite
        run: cmake --build build --target check-dimeta

      - name: Build coverage report
        run: cmake --build build --target dimeta-coverage

      - name: Coveralls (parallel)
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: build/coverage.info
          flag-name: ${{ matrix.llvm-version }}-${{ matrix.use-tbaa }}-${{ matrix.os }}-${{ matrix.with-flang }}
          parallel: true

  finish-coverage:
    needs: lit-suite
    runs-on: ubuntu-24.04
    steps:
      - name: Coveralls Finished
        uses: coverallsapp/github-action@master
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true
